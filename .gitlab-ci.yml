stages:
  - test
  - lint
  - format
  - type_check
  - coverage

test_job:
  stage: test
  script:
    - pip install -r requirements.txt
    - pytest

lint_job:
  stage: lint
  script:
    - pip install ruff
    - ruff check .

format_job:
  stage: format
  script:
    - pip install ruff
    - ruff format --check .

type_check_job:
  stage: type_check
  script:
    - pip install mypy
    - mypy backend --ignore-missing-imports

coverage_job:
  stage: coverage
  script:
    - pip install -r requirements.txt
    - pytest --cov=backend --cov-report=xml --cov-fail-under=80
